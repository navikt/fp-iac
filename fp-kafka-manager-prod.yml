kind: Application
apiVersion: nais.io/v1alpha1
metadata:
  name: fp-kafka-manager
  namespace: teamforeldrepenger
  labels:
    team: teamforeldrepenger
spec:
  image: europe-north1-docker.pkg.dev/nais-management-233d/poao/kafka-manager:2023.08.02-07.02-45dfb71
  port: 8080
  ingresses:
    - https://fp-kafka-manager.intern.nav.no
  prometheus:
    enabled: true
    path: /internal/prometheus
  readiness:
    path: /internal/health/readiness
    initialDelay: 20
  liveness:
    path: /internal/health/liveness
    initialDelay: 20
  replicas:
    min: 1
    max: 1  # 1 instance is required since in-memory session management is used
    cpuThresholdPercentage: 75
  resources:
    limits:
      cpu: "1"
      memory: 1024Mi
    requests:
      cpu: 250m
      memory: 512Mi
  azure: # Required
    application:
      enabled: true
      claims:
        groups:
          - id: 0d226374-4748-4367-a38a-062dcad70034 # driftsrolle prod
  kafka: # Optional. Required for Aiven
    pool: nav-prod
  env:
    - name: APP_CONFIG_JSON # Required
      value: >
        {
          "topics": [
            {
              "name": "teamforeldrepenger.fpoversikt-migrering-v1",
              "location": "AIVEN",
              "keyDeserializerType": "STRING",
              "valueDeserializerType": "STRING"
            }
          ]
        }
