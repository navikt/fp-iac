name: Deploy alerts topics

on:
  push:
    branches:
     - main
    paths:
      - .github/workflows/deploy-alert.yml
      - alert/**
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Deploy alertconfig to prod-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: prod-gcp
          RESOURCE: alert/foreldrepenger-alertconfig.yaml
          PRINT_PAYLOAD: true
      - name: Deploy to prod-gcp
        uses: nais/deploy/actions/deploy@v2
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: prod-gcp
          RESOURCE: alert/foreldrepenger-alerts.yaml
          PRINT_PAYLOAD: true
      - name: Deploy alertconfig to prod-fss
        uses: nais/deploy/actions/deploy@v2
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: prod-fss
          RESOURCE: alert/foreldrepenger-alertconfig.yaml
          PRINT_PAYLOAD: true
      - name: Deploy to prod-fss
        uses: nais/deploy/actions/deploy@v2
        env:
          APIKEY: ${{ secrets.NAIS_DEPLOY_APIKEY }}
          CLUSTER: prod-fss
          RESOURCE: alert/foreldrepenger-alerts.yaml
          PRINT_PAYLOAD: true