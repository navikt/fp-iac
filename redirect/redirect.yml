apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{name}}-redirect
  namespace: teamforeldrepenger
  labels:
    team: teamforeldrepenger
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: {{to}}
spec:
  ingressClassName: nais-ingress-external
  rules:
    - host: {{from}}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dummy-service
                port:
                  number: 80