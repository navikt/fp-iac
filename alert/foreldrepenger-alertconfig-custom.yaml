apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: foreldrepenger-slack
  namespace: teamforeldrepenger
  labels:
    team: teamforeldrepenger
    alertmanagerConfig: foreldrepenger-slack
spec:
  receivers:
    - name: foreldrepenger-slack-receiver
      slackConfigs:
        - apiURL:
            key: apiUrl
            name: slack-webhook
          channel: 'fp-daglig-overvåking-alerts'
          iconEmoji: ':scream:'
          username: 'Feilede prosesstask alert {{ cluster }}'
          sendResolved: true
          httpConfig:
            proxyURL: http://webproxy.nais:8088
          title: |-
            [{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}
          text: |-
            {{ .Annotations.summary }}
          color: |-
            {{ if eq .Status "firing" -}}
              {{ if eq .CommonLabels.severity "warning" -}}
                warning
              {{- else if eq .CommonLabels.severity "fatal" -}}
                #611f69
              {{- else if eq .CommonLabels.severity "critical" -}}
                #611f69
              {{- else if eq .CommonLabels.severity "danger" -}}
                danger
              {{- else if eq .CommonLabels.severity "error" -}}
                danger
              {{- else if eq .CommonLabels.severity "notice" -}}
                good
              {{- else if eq .CommonLabels.severity "info" -}}
                #36c5f0
              {{- else -}}
                .CommonLabels.severity
              {{- end -}}
            {{ else -}}
            good
            {{- end }}
  route:
    groupBy: [alertname]
    receiver: foreldrepenger-slack-receiver
    matchers:
      - name: "special_type_to_use_in_alertmanager_config"
        matchType: "="
        value: "foreldrepenger-prosesstask-alert"
    groupInterval: 10s
    groupWait: 5s
    repeatInterval: 1m

