apiVersion: kafka.nais.io/v1
kind: Topic
metadata:
  name: fpsak-dvh-stonadsstatistikk-v1
  namespace: teamforeldrepenger
  labels:
    team: teamforeldrepenger
spec:
  pool: {{pool}}
  config:
  {{#each config as |value key|}}
     {{key}}: {{value}}
  {{/each}}
  acl:
    - team: teamforeldrepenger
      application: fpsak
      access: write
    - team: dv-familie
      app: dvh-familie-konsument
      access: read
